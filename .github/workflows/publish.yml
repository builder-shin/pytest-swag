name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Get local version
        id: local
        run: echo "version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" >> "$GITHUB_OUTPUT"

      - name: Check if version exists on PyPI
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/pytest-swag/${{ steps.local.outputs.version }}/json")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if already published
        if: steps.check.outputs.exists == 'true'
        run: echo "v${{ steps.local.outputs.version }} already on PyPI — skipping."

      - name: Test
        if: steps.check.outputs.exists == 'false'
        run: |
          pip install -e ".[dev]"
          pytest tests/ -v --tb=short

      - name: Build
        if: steps.check.outputs.exists == 'false'
        run: |
          pip install build
          python -m build

      - name: Publish
        if: steps.check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
